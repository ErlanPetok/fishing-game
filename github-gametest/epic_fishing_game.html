<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Fishing Game - Ultimate Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', monospace;
      position: fixed;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    /* Force Horizontal Orientation Suggestion for Mobile */
    @media screen and (orientation: portrait) {
      body::before {
        content: "🔄 Please rotate your device to landscape mode!";
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #0a1a2e;
        color: #ffd966;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 18px;
        text-align: center;
        padding: 20px;
      }
    }

    /* UI Overlay elements */
    .instruction {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      color: rgba(255,255,200,0.85);
      font-size: 13px;
      background: rgba(0,0,0,0.65);
      width: fit-content;
      margin: 0 auto;
      padding: 5px 18px;
      border-radius: 40px;
      font-weight: bold;
      z-index: 20;
      font-family: monospace;
      backdrop-filter: blur(2px);
    }
    .instruction kbd {
      background: #2c3e2b;
      padding: 2px 6px;
      border-radius: 4px;
      margin: 0 2px;
      color: #ffd966;
    }
    /* Hide keyboard instructions on touch devices */
    @media (pointer: coarse) {
      .instruction { display: none; }
    }

    .debug-cycle {
      position: fixed;
      top: 10px;
      right: 55px; /* Adjusted to make room for hamburger menu */
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: monospace;
      z-index: 20;
      pointer-events: none;
    }

    /* Hamburger Menu Button */
    .menu-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 35px;
      height: 30px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      cursor: pointer;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      padding: 6px;
    }
    .menu-btn span {
      display: block;
      width: 100%;
      height: 3px;
      background: #ffd966;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* Mobile Controls Container */
    .mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }
    @media (pointer: coarse) {
      .mobile-controls { display: block; }
    }
    .dpad {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      gap: 15px;
      pointer-events: auto;
    }
    .action-btn-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      pointer-events: auto;
    }
    .joy-btn {
      width: 65px;
      height: 65px;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      color: white;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      active-background: rgba(255, 255, 255, 0.4);
    }
    .joy-btn:active {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0.95);
    }
    .cast-btn {
      width: 80px;
      height: 80px;
      background: rgba(255, 217, 102, 0.2);
      border: 2px solid #ffd966;
      font-size: 16px;
      font-weight: bold;
      color: #ffd966;
    }

    /* Pause Screen Modal */
    .pause-screen {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .pause-window {
      background: rgba(25, 45, 70, 0.95);
      border: 3px solid #ffd966;
      border-radius: 12px;
      width: 360px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .pause-title {
      text-align: center;
      color: #ffd966;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .tabs-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .tab-btn {
      background: #2c3e2b;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.1);
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .tab-btn:hover, .tab-btn:active {
      background: #ffd966;
      color: #2c3e2b;
      border-color: #ffd966;
    }
    .tab-content {
      display: none;
      margin-top: 15px;
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      max-height: 250px;
      overflow-y: auto;
      color: #fff;
    }
    .close-pause-btn {
      margin-top: 15px;
      width: 100%;
      background: #ff5252;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }
    
    /* Custom spacing inside Tab Data lists */
    .bag-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-family: monospace;
    }
    .upgrade-info {
      text-align: center;
      line-height: 1.6;
    }
    .action-upgrade-btn {
      display: block;
      width: 80%;
      margin: 10px auto 0;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }
    .action-upgrade-btn:disabled {
      background: #546E7A;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div class="instruction">🎮 <kbd>SPACE</kbd>/<kbd>CLICK</kbd> cast/hook | <kbd>← →</kbd>/<kbd>A D</kbd> move boat | <kbd>ESC</kbd> Menu | <kbd>9</kbd> Spawn Megalodon</div>
<div class="debug-cycle" id="cycleDebug">🌅 Sunset 0%</div>

<div class="menu-btn" id="menuBtn">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="mobile-controls">
  <div class="dpad">
    <div class="joy-btn" id="btnLeft">◀</div>
    <div class="joy-btn" id="btnRight">▶</div>
  </div>
  <div class="action-btn-container">
    <div class="joy-btn cast-btn" id="btnCast">🎣</div>
  </div>
</div>

<div class="pause-screen" id="pauseScreen">
  <div class="pause-window">
    <div class="pause-title">⏸️ GAME PAUSED</div>
    <div class="tabs-container">
      
      <div class="tab-wrapper">
        <button class="tab-btn" onclick="openTab('bagTab')">🎒 TAS IKAN (BAG)</button>
        <div id="bagTab" class="tab-content">
          </div>
      </div>

      <div class="tab-wrapper">
        <button class="tab-btn" onclick="openTab('upgradeTab')">🔧 UPGRADE ROD</button>
        <div id="upgradeTab" class="tab-content">
          <div class="upgrade-info">
            <p id="menuRodLevel">Level: 1 / 10</p>
            <p id="menuRodBonus" style="color:#81C784;">+0.0% width bonus</p>
            <p id="menuRodCost" style="font-weight:bold; margin-top:5px;"></p>
            <button class="action-upgrade-btn" id="menuUpgradeBtn" onclick="triggerUpgrade()">UPGRADE</button>
          </div>
        </div>
      </div>

      <div class="tab-wrapper">
        <button class="tab-btn" onclick="goToMainMenu()">🏠 GO TO MAIN MENU</button>
      </div>
      
    </div>
    <button class="close-pause-btn" onclick="togglePauseMenu()">RESUME GAME</button>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const cycleDebug = document.getElementById("cycleDebug");
  const pauseScreen = document.getElementById("pauseScreen");

  // --- AUDIO MANAGER ---
  const bgmChill = new Audio('bgm_chill.mp3');
  const bgmBoss = new Audio('bgm_boss.mp3');
  bgmChill.loop = true;
  bgmBoss.loop = true;

  // Load volume from vault
  let gameVolume = parseFloat(localStorage.getItem("gameVolume")) || 0.5;
  bgmChill.volume = gameVolume;
  bgmBoss.volume = gameVolume;

  function playMusic(track) {
      if (track === 'boss') {
          bgmChill.pause();
          bgmBoss.play().catch(e => console.log("Audio waiting..."));
      } else {
          bgmBoss.pause();
          bgmChill.play().catch(e => console.log("Audio waiting..."));
      }
  }

  // Ensure audio starts on first interaction
  canvas.addEventListener('mousedown', () => {
      if (bgmChill.paused && !bossMode) {
          bgmChill.play();
      }
  }, { once: true });

  // ========== DAY/NIGHT CYCLE SYSTEM ==========
  let cycleTime = 0.0;           
  let cycleDuration = 90;     //the cycle duration (more number = longer each cycle) (also in seconds)   
  let lastTimestamp = performance.now();
  
  let starPositions = [];
  let starOpacity = 0;
  let moonX = canvas.width + 100;
  let moonY = 85;
  let moonOpacity = 0;
  let sunX = -100;
  let sunY = 0;
  let sunOpacity = 0;
  let waterDarkness = 0;
  let cloudPositions = [{x: 0, y: 42}, {x: 0, y: 58}];
  let cloudsActive = false;
  
  function initStars() {
    starPositions = [];
    for (let i = 0; i < 200; i++) {
      starPositions.push({
        x: Math.random() * canvas.width * 1.2,
        y: 20 + Math.random() * 150,
        size: 1 + Math.random() * 2,
        twinkle: Math.random() * Math.PI * 2
      });
    }
  }
  initStars();
  
  function updateDayNightCycle(deltaSec) {

    if (gameState === "paused") return;

    if (deltaSec > 0.1) deltaSec = 0.033;
    cycleTime += deltaSec / cycleDuration;
    if (cycleTime >= 1.0) cycleTime -= 1.0;
    
    let phaseName = "";
    if (cycleTime < 0.2) phaseName = "🌅 Sunset";
    else if (cycleTime < 0.4) phaseName = "🌙 Night";
    else if (cycleTime < 0.5) phaseName = "🌚 Midnight";
    else if (cycleTime < 0.7) phaseName = "🌤️ Sunrise";
    else phaseName = "☀️ Day";
    cycleDebug.textContent = `${phaseName} ${Math.floor(cycleTime * 100)}%`;
    
    let t = cycleTime;
    if (t >= 0.2 && t <= 0.7) {
      let starT = (t - 0.2) / 0.5;
      starOpacity = Math.sin(starT * Math.PI) * 0.85;
    } else { starOpacity = 0; }
    
    if (t >= 0.2 && t <= 0.7) {
      let moonT = (t - 0.2) / 0.5;
      if (t <= 0.5) {
        let startX = canvas.width - 80;
        let endX = canvas.width * 0.65;
        moonX = startX - (startX - endX) * (moonT * 2);
        moonOpacity = Math.sin(moonT * Math.PI) * 0.95;
      } else {
        let fadeT = (t - 0.5) / 0.2;
        moonX = canvas.width * 0.65 + fadeT * 180;
        moonOpacity = Math.max(0, 0.95 * (1 - fadeT * 1.5));
      }
      moonY = 75 + Math.sin(moonT * Math.PI) * 12;
    } else { moonOpacity = 0; }
    
    if (t >= 0.5 && t <= 0.7) {
      let sunT = (t - 0.5) / 0.2;
      sunX = -40 + sunT * (canvas.width * 0.35);
      sunOpacity = Math.sin(sunT * Math.PI) * 0.85;
      sunY = waterTop - 85;
    } else if (t >= 0.7 && t <= 0.9) {
      let dayT = (t - 0.7) / 0.2;
      sunX = canvas.width * 0.35 + dayT * (canvas.width * 0.45);
      sunOpacity = 0.85 * (1 - dayT * 0.5);
      sunY = waterTop - 85 + dayT * 20;
    } else if (t >= 0.9 && t <= 1.0) {
      let setT = (t - 0.9) / 0.1;
      sunX = canvas.width * 0.8 + setT * 150;
      sunOpacity = 0.4 * (1 - setT);
      sunY = waterTop - 65 + setT * 30;
    } else { sunOpacity = 0; }
    
    if (t >= 0.2 && t <= 0.7) {
      let darkT = (t - 0.2) / 0.5;
      waterDarkness = Math.sin(darkT * Math.PI) * 0.55;
    } else if (t >= 0.7 && t <= 0.8) {
      waterDarkness = Math.max(0, 0.55 * (1 - (t-0.7)/0.1));
    } else if (t >= 0 && t <= 0.1) {
      waterDarkness = 0.08 * (1 - t/0.1);
    } else { waterDarkness = 0; }
    
    if (t >= 0.7) {
      cloudsActive = true;
      let drift = (performance.now() * 0.0006) % (canvas.width + 400);
      cloudPositions[0] = { x: (canvas.width * 0.15 + drift) % (canvas.width + 300) - 150, y: 42 };
      cloudPositions[1] = { x: (canvas.width * 0.55 + drift * 0.7) % (canvas.width + 300) - 150, y: 58 };
    } else { cloudsActive = false; }
  }
  
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }
  resizeCanvas();
  window.addEventListener("resize", () => {
    resizeCanvas();
    updateWorldBounds();
    boat.x = Math.min(Math.max(boat.x, 60), canvas.width - 60);
    updateFishermanPos();
    if (!rod.dropping && !rod.retracting) resetRodPosition();
    initStars();
  });

  // World constants
  let waterTop = 150;
  let oceanFloor = canvas.height - 60;
  
  function updateWorldBounds() {
    waterTop = Math.min(180, canvas.height * 0.22);
    oceanFloor = canvas.height - 65;
    if (oceanFloor < waterTop + 90) oceanFloor = waterTop + 100;
  }
  updateWorldBounds();

  // Game state
  let time = 0;
  let score = 0;
  let combo = 0;
  let comboTimer = 0;
  let popups = [];
  let gameState = "normal"; // "normal", "minigame", "paused"
  let isBossMusicPlaying = false;

  function saveGame() {
    const gameData = {
        score: score,
        rodLevel: fishingRodLevel
    };
    localStorage.setItem("fishingGameProgress", JSON.stringify(gameData));
}

function loadGame() {
    const savedData = localStorage.getItem("fishingGameProgress");
    if (savedData) {
        const data = JSON.parse(savedData);
        score = data.score || 0;
        fishingRodLevel = data.rodLevel || 1;
        console.log("Progress loaded, Sensei! 🎣");
    }
}

  // ========== GLOBAL CUSTOM SKIN LOADING PIPELINE ==========
  let customSkinImg = new Image(); // Create the object immediately
  let isSkinLoaded = false;

  const storedSkinData = localStorage.getItem("customFishermanSkin");
  
  if (storedSkinData) {
      customSkinImg.onload = function() {
          isSkinLoaded = true;
          console.log("Model Nelayan kustom dimuat! 🎣");
      };
      customSkinImg.src = storedSkinData;
  } else {
      isSkinLoaded = false; // No custom skin, game will use the fallback vector drawing
      console.log("Tidak ada model kustom, menggunakan desain default.");
  }

  // UPGRADE SYSTEM
  let fishingRodLevel = 1;
  let maxRodLevel = 10;
  function getHitToleranceBonus() { return 0.07 + (fishingRodLevel - 1) * 0.015; }
  function getUpgradeCost() { return 25 + (fishingRodLevel - 1) * 10; }
  
  function performUpgrade() {
    if (fishingRodLevel >= maxRodLevel) return false;
    const cost = getUpgradeCost();
    if (score >= cost) {
      score -= cost;
      fishingRodLevel++;
      popups.push({ x: canvas.width/2, y: canvas.height/2, text: `🔧 ROD LV ${fishingRodLevel}!`, life: 100, color: "#4CAF50" });
      updateMenuUI();
      return true;
    } else {
      popups.push({ x: canvas.width/2, y: canvas.height/2, text: `❌ Need ${cost} pts!`, life: 80, color: "#FF5252" });
      return false;
    }
  }

  // INVENTORY
  let inventory = { "Kecil":0, "Sedang":0, "Besar":0, "Neon":0, "Pedang":0, "Legendaris":0, "Megalodon":0 };

  // BOSS SYSTEM
  let bossMode = false;
  let bossAlertTimer = 0; 
  let bossStrikes = 0;
  let bossDefeated = false;

  // MINIGAME
  let minigame = { slider: 0.5, direction: 1, target: 0.5, hits: 0, requiredHits: 4, speed: 0.03 };

  // BOAT & CORE OBJECTS
  const boat = { x: canvas.width/2, y: 0, width: 100, height: 28, speed: 6.5 };
  const fisherman = { x: 0, y: 0, height: 42 };
  const rod = { x:0, y:0, speedY:5.5, speedX:5.5, dropping:false, retracting:false, caughtFish:null };
  let fish = [];
  let decorations = [];
  let bubbles = [];
  let keys = {};
  let facing = 1;

  // Touch UI movement states
  let isMovingLeft = false;
  let isMovingRight = false;

  function getRodTip() {
    const lineLength = 65;
    const angle = facing === 1 ? -Math.PI/4 : -3*Math.PI/4;
    return { x: fisherman.x + Math.cos(angle)*lineLength, y: fisherman.y + 14 + Math.sin(angle)*lineLength };
  }
  
  function updateFishermanPos() { fisherman.x = boat.x; fisherman.y = boat.y - fisherman.height + 8; }
  function resetRodPosition() { const tip = getRodTip(); rod.x = tip.x; rod.y = tip.y; rod.dropping = false; rod.retracting = false; }
  
  function spawnFish() {
    if (bossMode || fish.length > 18) return;
    const fromLeft = Math.random() < 0.5;
    let size, value, color, speed, name, type;
    const r = Math.random();
    if (r < 0.4) { name="Kecil"; type="normal"; size=20; value=3; color="#FF8A65"; speed=1.8+Math.random()*1.2; }
    else if (r<0.65) { name="Sedang"; type="normal"; size=23; value=5; color="#64B5F6"; speed=1.3+Math.random()*0.9; }
    else if (r<0.8) { name="Besar"; type="normal"; size=30; value=10; color="#BA68C8"; speed=0.9+Math.random()*0.7; }
    else if (r<0.9) { name="Neon"; type="neon"; size=20; value=12; color="#00FFCC"; speed=3.2+Math.random()*1.0; }
    else if (r<0.96) { name="Pedang"; type="pedang"; size=24; value=15; color="#ECEFF1"; speed=2.2+Math.random()*0.8; }
    else { name="Legendaris"; type="gold"; size=35; value=20; color="#FFD700"; speed=1.0+Math.random()*0.4; }
    const minY = waterTop + 20, maxY = oceanFloor - 40;
    fish.push({ name, type, x: fromLeft ? -50 : canvas.width+50, y: minY + Math.random() * (maxY - minY), size, value, color, speed, dir: fromLeft ? 1 : -1, state:"alive" });
  }

  function spawnMegalodon() {
    fish = [];
    fish.push({ name:"Megalodon", type:"boss", x: -150, y:(waterTop+oceanFloor)/2, size:75, value:200, color:"#37474F", speed:1.2, dir:1, state:"alive" });
    bossMode = true;
    bossAlertTimer = 180;
    bossStrikes = 0;
    bossDefeated = false;
  }

  function addBubble() {
    if (Math.random() > 0.1) return;
    bubbles.push({ x:20+Math.random()*(canvas.width-40), y: oceanFloor-15+Math.random()*30, size:3+Math.random()*5.5, speed:0.6+Math.random()*1.3 });
  }
  
  function updateBubbles() {
    for(let i=0;i<bubbles.length;i++) {
      bubbles[i].y -= bubbles[i].speed;
      if(bubbles[i].y+bubbles[i].size < waterTop) bubbles.splice(i--,1);
    }
  }

  function startMinigame(fishCaught) {
    gameState = "minigame";
    minigame.slider = 0.3+Math.random()*0.4;
    minigame.hits = 0;
    minigame.target = 0.3+Math.random()*0.5;
    minigame.direction = Math.random()<0.5?1:-1;
    if(fishCaught.type === "boss") { minigame.speed=0.052; minigame.requiredHits=10; }
    else if(fishCaught.value>=20) { minigame.speed=0.040; minigame.requiredHits=6; }
    else if(fishCaught.value>=15) { minigame.speed=0.038; minigame.requiredHits=5; }
    else if(fishCaught.value>=10) { minigame.speed=0.032; minigame.requiredHits=5; }
    else { minigame.speed=0.026; minigame.requiredHits=4; }
  }

  function catchSuccess() {
    combo++; comboTimer = 280;
    const gained = rod.caughtFish.value * combo;
    score += gained;
    saveGame();
    if(inventory[rod.caughtFish.name] !== undefined) inventory[rod.caughtFish.name]++;
    popups.push({ x:rod.x, y:rod.y-20, text:`+${gained} (${rod.caughtFish.name}!)`, life:80, color:rod.caughtFish.color });
    if(rod.caughtFish.type === "boss") { bossMode=false; bossDefeated=true; popups.push({ x:canvas.width/2,y:canvas.height/2, text:"🏆 MEGALODON DEFEATED!", life:150, color:"#FFF"}); }
    fish = fish.filter(f => f !== rod.caughtFish);
    rod.caughtFish = null;
    gameState="normal";
    resetRodPosition();
  }

  function failMinigame() {
    combo=0; comboTimer=0;
    if(rod.caughtFish) {
      if(rod.caughtFish.type === "boss") {
        bossStrikes++;
        popups.push({ x:canvas.width/2,y:canvas.height*0.4, text:`💥 Line snapped! ${bossStrikes}/10`, life:80, color:"#FF5252" });
        if(bossStrikes>=10) { bossMode=false; fish=[]; rod.caughtFish=null; gameState="normal"; resetRodPosition(); popups.push({ x:canvas.width/2,y:canvas.height/2, text:"🦈 Megalodon escaped...", life:140, color:"#B0BEC5"}); return; }
        rod.caughtFish.state="alive";
        rod.caughtFish.x = Math.random()<0.5 ? -120 : canvas.width+120;
        rod.caughtFish.dir = rod.caughtFish.x<0 ? 1 : -1;
      } else {
        rod.caughtFish.state="alive";
        rod.caughtFish.dir = facing===1 ? -1 : 1;
        rod.caughtFish.x = rod.x; rod.caughtFish.y = rod.y;
      }
    }
    rod.caughtFish=null;
    gameState="normal";
    resetRodPosition();
  }

  // Handle Input Activation Mechanics (Space or Mouse Click or Touch Button)
  function handleActionTrigger() {
    if (gameState === "paused") return;
    
    if (gameState === "minigame") {
      const diff = Math.abs(minigame.slider - minigame.target);
      
      // The boss starts tight (0.05) but gets a small helper bonus from your rod level!
      const baseTolerance = (rod.caughtFish && rod.caughtFish.type === "boss") 
        ? 0.05 + (fishingRodLevel * 0.005) 
        : getHitToleranceBonus();
        
      if (diff <= baseTolerance) {
        minigame.hits++;
        minigame.target = 0.2 + Math.random() * 0.6;
        if (minigame.hits >= minigame.requiredHits) catchSuccess();
        else { minigame.slider = minigame.target + (Math.random() - 0.5) * 0.1; minigame.direction *= -1; }
      } else failMinigame();
      return;
    }
    
    if (!rod.dropping && !rod.retracting && gameState === "normal") {
      const tip = getRodTip(); rod.dropping = true; rod.x = tip.x; rod.y = tip.y; rod.retracting = false;
    }
  }

  function update() {
    if (gameState === "paused") return;
    
    time += 0.025;
    updateWorldBounds();
    
    if (score >= 100 && !bossMode && !bossDefeated && bossStrikes < 10) {
      bossMode = true; bossAlertTimer = 180; bossStrikes = 0; spawnMegalodon();
    }
    if (bossAlertTimer > 0) bossAlertTimer--;
    
    boat.y = waterTop - boat.height + Math.sin(time * 2.5) * 4.5;
    updateFishermanPos();
    
    // Core Movement parsing Dual Axis Input (Keyboard Arrows/WASD + Touch Buttons)
    if (gameState === "normal") {
      if (keys["ArrowLeft"] || keys["KeyA"] || isMovingLeft) { boat.x -= boat.speed; facing = -1; }
      if (keys["ArrowRight"] || keys["KeyD"] || isMovingRight) { boat.x += boat.speed; facing = 1; }
    }
    boat.x = Math.max(50, Math.min(canvas.width - 50, boat.x));
    
    if (gameState === "normal" && !rod.dropping && !rod.retracting && !rod.caughtFish) {
      const tip = getRodTip(); rod.x = tip.x; rod.y = tip.y;
    }
    const currentTip = getRodTip();
    
    if (rod.dropping && gameState === "normal") {
      rod.y += rod.speedY;
      if (keys["ArrowLeft"] || keys["KeyA"] || isMovingLeft) rod.x -= rod.speedX;
      if (keys["ArrowRight"] || keys["KeyD"] || isMovingRight) rod.x += rod.speedX;
      rod.x = Math.max(15, Math.min(canvas.width - 15, rod.x));
      if (rod.y >= oceanFloor) { rod.dropping = false; rod.retracting = true; }
    }
    else if (rod.retracting && gameState === "normal") {
      const dx = currentTip.x - rod.x, dy = currentTip.y - rod.y;
      rod.x += dx * 0.12; rod.y += dy * 0.12;
      if (rod.caughtFish) {
        rod.caughtFish.x = rod.x;
        rod.caughtFish.y = rod.y - (rod.caughtFish.type === "boss" ? 15 : 3);
      }
      if (Math.hypot(rod.x - currentTip.x, rod.y - currentTip.y) < 15) {
        if (!rod.caughtFish) { combo = 0; comboTimer = 0; }
        resetRodPosition();
      }
    }
    
    if (gameState === "minigame") {
      minigame.slider += minigame.speed * minigame.direction;
      if (minigame.slider > 1) { minigame.slider = 1; minigame.direction = -1; }
      else if (minigame.slider < 0) { minigame.slider = 0; minigame.direction = 1; }
    }
    
    for (let i = 0; i < fish.length; i++) {
      const f = fish[i];
      if (f.state === "alive") {
        f.x += f.speed * f.dir;
        if (f.type === "boss") {
          if (f.x > canvas.width + 160 && f.dir === 1) f.dir = -1;
          if (f.x < -160 && f.dir === -1) f.dir = 1;
        } else {
          if (f.x + f.size < -100 || f.x - f.size > canvas.width + 100) { fish.splice(i, 1); i--; continue; }
        }
        f.y = Math.min(Math.max(f.y, waterTop + 30), oceanFloor - 35);
      }
    }
    
    if (gameState === "normal" && rod.dropping && !rod.caughtFish) {
      for (let f of fish) {
        if (f.state !== "alive") continue;
        const hitRange = f.type === "boss" ? f.size * 0.7 : f.size * 0.8;
        if (Math.hypot(rod.x - f.x, rod.y - f.y) < hitRange) {
          rod.caughtFish = f; f.state = "hooked"; rod.dropping = false; rod.retracting = true;
          startMinigame(f); break;
        }
      }
    }
    
    for (let i = 0; i < popups.length; i++) { popups[i].y -= 0.8; popups[i].life--; if (popups[i].life <= 0) popups.splice(i--, 1); }
    if (comboTimer > 0) comboTimer--; else combo = 0;
    
    if (!bossMode && Math.random() < (combo > 2 ? 0.04 : 0.025) && fish.length < 15) spawnFish();
    addBubble(); updateBubbles();
  }
  
  // ========== DRAW FUNCTION ==========
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let t = cycleTime;
    
    // Dynamic Sky Calculations
    let skyColor1, skyColor2, waterColor1, waterColor2, showOriginalClouds = true;
    if (bossMode) {
      skyColor1 = "#311B92"; skyColor2 = "#FF8F00"; waterColor1 = "#1A237E"; waterColor2 = "#010A15"; showOriginalClouds = false;
    } else if (t < 0.2) {
      skyColor1 = "#FFDAB9"; skyColor2 = "#7EC8E0"; waterColor1 = "#4A9FD8"; waterColor2 = "#0A2F44";
    } else if (t < 0.4) {
      let intensity = (t - 0.2) / 0.2, r = Math.floor(20 + intensity * 15), g = Math.floor(25 + intensity * 20), b = Math.floor(55 + intensity * 30);
      skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-10}, ${g-5}, ${b+10})`; waterColor1 = "#0F2B4F"; waterColor2 = "#051525"; showOriginalClouds = false;
    } else if (t < 0.5) {
      skyColor1 = "#0A0F2A"; skyColor2 = "#151B3A"; waterColor1 = "#081525"; waterColor2 = "#020810"; showOriginalClouds = false;
    } else if (t < 0.7) {
      let intensity = (t - 0.5) / 0.2, r = 255, g = Math.floor(150 + intensity * 68), b = Math.floor(100 + intensity * 85);
      skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-30}, ${g-20}, ${b+20})`; waterColor1 = "#2A6F9E"; waterColor2 = "#0A2F44"; showOriginalClouds = intensity < 0.7;
    } else {
      let intensity = (t - 0.7) / 0.3, r = Math.floor(135 - intensity * 35), g = Math.floor(206 - intensity * 26), b = Math.floor(235 - intensity * 15);
      skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-20}, ${g-15}, ${b+10})`; waterColor1 = "#4A9FD8"; waterColor2 = "#0A2F44";
    }
    
    // 1. Render Sky Background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, waterTop);
    skyGrad.addColorStop(0, skyColor1); skyGrad.addColorStop(1, skyColor2);
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, waterTop);
    
    // 2. Render Sky Elements (Stars, Moon, Sun) -> Placed here to sit behind the boat/fisherman
    if (starOpacity > 0.05 && !bossMode && (t >= 0.2 && t <= 0.7)) {
      for (let star of starPositions) {
        ctx.fillStyle = `rgba(255, 245, 210, ${starOpacity * (0.4 + (0.5 + Math.sin(time * 3 + star.twinkle) * 0.5) * 0.6)})`;
        ctx.beginPath(); ctx.arc(star.x % canvas.width, star.y, star.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    
    if (moonOpacity > 0.05 && moonX > -50 && !bossMode) {
      ctx.beginPath(); ctx.arc(moonX, moonY, 35, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 245, 210, ${moonOpacity * 0.9})`; ctx.fill();
    }
    
    if (sunOpacity > 0.05 && sunX > -80 && sunX < canvas.width + 100 && !bossMode) {
      ctx.beginPath(); ctx.arc(sunX, sunY, 32, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 180, 70, ${sunOpacity * 0.9})`; ctx.fill();
      ctx.beginPath(); ctx.arc(sunX, sunY, 26, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 220, 100, ${sunOpacity})`; ctx.fill();
    }
    
    if (showOriginalClouds && !bossMode) {
      ctx.fillStyle = `rgba(255, 248, 225, 0.85)`; ctx.beginPath();
      ctx.ellipse(80, 45, 60, 38, 0, 0, Math.PI * 2); ctx.ellipse(150, 28, 70, 45, 0, 0, Math.PI * 2); ctx.ellipse(230, 50, 55, 35, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(canvas.width - 150, 60, 80, 45, 0, 0, Math.PI * 2); ctx.ellipse(canvas.width - 60, 40, 65, 40, 0, 0, Math.PI * 2); ctx.fill();
    }

    if (cloudsActive && !bossMode && t >= 0.7) {
      ctx.fillStyle = "rgba(255, 252, 235, 0.7)";
      for (let cloud of cloudPositions) {
        ctx.beginPath(); ctx.ellipse(cloud.x, cloud.y, 52, 30, 0, 0, Math.PI * 2); ctx.ellipse(cloud.x + 38, cloud.y - 4, 45, 28, 0, 0, Math.PI * 2); ctx.fill();
      }
    }
    
    // 3. Render Under-water / Sea Gradients
    const waterGrad = ctx.createLinearGradient(0, waterTop, 0, canvas.height);
    waterGrad.addColorStop(0, waterColor1); waterGrad.addColorStop(0.6, waterColor2); waterGrad.addColorStop(1, `rgba(0, 10, 20, 0.9)`);
    ctx.fillStyle = waterGrad; ctx.fillRect(0, waterTop, canvas.width, canvas.height - waterTop);
    
    if (waterDarkness > 0.02 && !bossMode && (t >= 0.2 && t <= 0.7)) {
      ctx.fillStyle = `rgba(5, 10, 30, ${waterDarkness * 0.5})`; ctx.fillRect(0, waterTop, canvas.width, canvas.height - waterTop);
    }

    if (t < 0.2 || t >= 0.7 || (t >= 0.5 && t < 0.6)) {
      ctx.beginPath(); ctx.moveTo(0, waterTop);
      for (let wx = 0; wx < canvas.width + 20; wx += 25) { ctx.lineTo(wx, waterTop + Math.sin(wx * 0.02 + time * 2.5) * 4); }
      ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fillStyle = "rgba(255, 255, 240, 0.18)"; ctx.fill();
    }
    
    ctx.fillStyle = bossMode ? "#3E2723" : "#8B6914"; ctx.fillRect(0, oceanFloor, canvas.width, canvas.height - oceanFloor);
    ctx.fillStyle = bossMode ? "#5D4037" : "#C49A3C";
    for (let i = 0; i < 60; i++) {
      ctx.beginPath(); ctx.arc((i * 57 + time * 8) % canvas.width, oceanFloor + 4, 2.5, 0, Math.PI * 2); ctx.fill();
    }
    
    for (let b of bubbles) {
      ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fillStyle = bossMode ? `rgba(130, 170, 200, 0.25)` : `rgba(180, 230, 255, ${0.5 + Math.sin(time * 4 + b.x) * 0.2})`; ctx.fill();
    }

    // 3.5. Render Ocean Floor Decorations (Seaweed and Corals)
    for (let dec of decorations) {
      ctx.save();
      ctx.translate(dec.x, oceanFloor);
      
      if (dec.type === "seaweed") {
        // Seaweed sways back and forth gently based on the game time
        let sway = Math.sin(time * 1.5 + dec.swayOffset) * (dec.size * 0.18);
        ctx.fillStyle = bossMode ? "#2E7D32" : "#26A69A"; // Darker green during boss fight
        ctx.beginPath();
        ctx.moveTo(-5, 2);
        // Draw a wavy blade of seaweed bending upwards
        ctx.bezierCurveTo(-8, -dec.size * 0.3, -2 + sway, -dec.size * 0.6, 0 + sway, -dec.size);
        ctx.bezierCurveTo(4 + sway, -dec.size * 0.6, 6, -dec.size * 0.3, 5, 2);
        ctx.closePath();
        ctx.fill();
      } else {
        // Draw colorful branching coral shapes
        ctx.fillStyle = dec.color;
        ctx.shadowBlur = bossMode ? 4 : 0;
        ctx.shadowColor = dec.color;
        
        ctx.beginPath();
        // Central thick branch
        ctx.fillRect(-4, -dec.size * 0.6, 8, dec.size * 0.6 + 2);
        // Left branch node
        ctx.fillRect(-dec.size * 0.35, -dec.size * 0.45, dec.size * 0.35, 6);
        ctx.fillRect(-dec.size * 0.35, -dec.size * 0.7, 5, dec.size * 0.25);
        // Right branch node
        ctx.fillRect(0, -dec.size * 0.3, dec.size * 0.4, 5);
        ctx.fillRect(dec.size * 0.4 - 5, -dec.size * 0.55, 5, dec.size * 0.25);
      }
      ctx.restore();
    }
    
    // Fish Rendering
    for (let f of fish) {
      if (f.state === "removed") continue;
      ctx.save();
      const drawX = (f.state === "hooked" && rod.caughtFish === f) ? rod.x : f.x;
      const drawY = (f.state === "hooked" && rod.caughtFish === f) ? rod.y - 3 : f.y;
      ctx.translate(drawX, drawY);
      if (f.dir < 0) ctx.scale(-1, 1);
      if (f.type === "boss") {
        ctx.shadowBlur = 25; ctx.shadowColor = "#FF3D00"; ctx.fillStyle = f.color;
        ctx.beginPath(); ctx.ellipse(0, 0, f.size, f.size * 0.55, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-10, -f.size * 0.4); ctx.lineTo(-45, -f.size * 0.9); ctx.lineTo(-40, -f.size * 0.2); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-f.size * 0.85, -5); ctx.lineTo(-f.size * 1.3, -f.size * 0.5); ctx.lineTo(-f.size * 1.1, 0); ctx.lineTo(-f.size * 1.3, f.size * 0.5); ctx.lineTo(-f.size * 0.85, 5); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#FF1744"; ctx.beginPath(); ctx.arc(f.size * 0.5, -f.size * 0.12, 6, 0, Math.PI * 2); ctx.fill();
      } else {
        if (f.type === "neon") { ctx.shadowBlur = 15; ctx.shadowColor = "#00FFCC"; }
        ctx.fillStyle = f.color; ctx.beginPath(); ctx.ellipse(0, 0, f.size, f.size * 0.65, 0, 0, Math.PI * 2); ctx.fill();
        if (f.type === "pedang") {
          ctx.fillStyle = "#B0BEC5"; ctx.beginPath(); ctx.moveTo(f.size * 0.8, -2); ctx.lineTo(f.size * 1.7, 0); ctx.lineTo(f.size * 0.8, 2); ctx.fill();
        }
        ctx.fillStyle = f.type === "gold" ? "#FF9800" : "#4A2A1A"; ctx.beginPath(); ctx.moveTo(-f.size * 0.7, -5); ctx.lineTo(-f.size * 0.95, 0); ctx.lineTo(-f.size * 0.7, 5); ctx.fill();
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(f.size * 0.4, -f.size * 0.12, f.size * 0.15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#010101"; ctx.beginPath(); ctx.arc(f.size * 0.45, -f.size * 0.14, f.size * 0.08, 0, Math.PI * 2); ctx.fill();
      }
      ctx.restore();
    }
    
    // Boat & Fisherman Setup
    const bx = boat.x + (Math.sin(time * 1.2) * 2.2) * 0.5, by = boat.y + (Math.sin(time * 1.8) * 3.2) * 0.4;
    ctx.save(); ctx.translate(bx, by + boat.height / 2); ctx.rotate(Math.sin(time * 1.8) * 0.045);
    ctx.fillStyle = "#8B5A2B"; ctx.fillRect(-50, -boat.height / 2, 100, boat.height);
    ctx.fillStyle = "#B97F44"; ctx.fillRect(-42, -boat.height / 2 - 10, 84, 12);
    ctx.fillStyle = "#CD9A5B"; ctx.fillRect(-30, -boat.height / 2 - 16, 60, 8);
    ctx.fillStyle = "#6B3E1A"; ctx.fillRect(28, -boat.height / 2 - 44, 5, 48);

    // NEW CUSTOM SKIN LOGIC
    ctx.save(); 
    if (facing === -1) ctx.scale(-1, 1);

    if (isSkinLoaded && customSkinImg) {
        // Draw the custom image at the fisherman's position
        const customW = 100; 
        const customH = 100; 
        // We adjust the Y to match where the old fisherman stood
        ctx.drawImage(customSkinImg, -customW / 2, -boat.height / 2 - 100, customW, customH);
    } else {
        // Fallback to the original vector drawing if no custom skin
        ctx.fillStyle = "#4A6A8F"; ctx.fillRect(-10, -boat.height / 2 - 56, 20, 38);
        ctx.fillStyle = "#FFDFB3"; ctx.beginPath(); ctx.arc(0, -boat.height / 2 - 62, 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#D2B48C"; ctx.fillRect(-15, -boat.height / 2 - 72, 30, 9);
        ctx.fillStyle = "#F4C28B"; ctx.fillRect(-9, -boat.height / 2 - 76, 18, 8);
        ctx.beginPath(); ctx.arc(3, -boat.height / 2 - 59, 4, 0.05, Math.PI - 0.05); ctx.strokeStyle = "#5D3A1A"; ctx.lineWidth = 1.8; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(10, -boat.height / 2 - 38); ctx.lineTo(42, -boat.height / 2 - 48); ctx.lineTo(44, -boat.height / 2 - 44); ctx.fillStyle = "#A67B5B"; ctx.fill();
    }
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,210,0.20)"; ctx.beginPath(); ctx.ellipse(0, boat.height / 2 + 8, 54, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    
    // Fishing Rod Line Structure
    const tip = getRodTip();
    ctx.beginPath(); ctx.moveTo(fisherman.x + (facing === 1 ? 6 : -6), fisherman.y + 16); ctx.lineTo(tip.x, tip.y); ctx.lineWidth = 3.5; ctx.strokeStyle = "#5D4037"; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tip.x, tip.y); ctx.lineTo(rod.x, rod.y); ctx.lineWidth = 1.8; ctx.strokeStyle = "#B0BEC5"; ctx.stroke();
    ctx.fillStyle = "#E65100"; ctx.fillRect(rod.x - 4, rod.y - 2, 8, 6);
    ctx.fillStyle = "#FFB74D"; ctx.beginPath(); ctx.ellipse(rod.x, rod.y + 1, 3.5, 4.5, 0, 0, Math.PI * 2); ctx.fill();
    
    // Minigame GUI
    if (gameState === "minigame") {
      const isBossFight = (rod.caughtFish && rod.caughtFish.type === "boss");
      const barW = 360, barH = 26, barX = canvas.width / 2 - barW / 2, barY = canvas.height * 0.68;
      ctx.fillStyle = isBossFight ? "rgba(74,0,0,0.92)" : "rgba(0,0,0,0.85)"; ctx.fillRect(barX - 5, barY - 5, barW + 10, barH + 45);
      ctx.fillStyle = "#2C2E3E"; ctx.fillRect(barX, barY, barW, barH);
      const currentTolerance = isBossFight 
        ? 0.05 + ((fishingRodLevel - 1) * 0.0075) 
        : getHitToleranceBonus();
      
      const targetWidth = currentTolerance * barW * 2;
      
      // Draw Outer Green Bar
      ctx.fillStyle = "#4CAF50"; 
      ctx.fillRect(barX + minigame.target * barW - targetWidth/2, barY, targetWidth, barH);
      
      // Draw Inner Light Green Highlight
      ctx.fillStyle = "#81C784"; 
      ctx.fillRect(barX + minigame.target * barW - (targetWidth-4)/2, barY + 3, targetWidth - 4, barH - 6);
      ctx.fillStyle = "#FFC107"; ctx.fillRect(barX + minigame.slider * barW - 6, barY - 10, 12, barH + 20);
      ctx.font = "bold 20px monospace"; ctx.fillStyle = "white";
      ctx.fillText(isBossFight ? `🦈 MEGALODON BATTLE ${minigame.hits}/10` : `🎣 REEL BATTLE ${minigame.hits}/${minigame.requiredHits}`, barX + 15, barY - 12);
    }
    
    if (bossAlertTimer > 0) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, canvas.height * 0.35, canvas.width, 100);
      ctx.font = "bold 32px 'Segoe UI'"; ctx.fillStyle = "#FF3D00"; ctx.textAlign = "center";
      let shakeX = (Math.random() - 0.5) * 4; // Tiny random shake
      let shakeY = (Math.random() - 0.5) * 4;
      ctx.fillText("THE OCEAN FLOOR TREMBLES. THE ANCIENT ONE AWAKES", canvas.width / 2 + shakeX, canvas.height * 0.41 + shakeY);
      ctx.font = "bold 18px monospace"; ctx.fillStyle = "#FFF"; ctx.fillText("Defeat it or Die trying", canvas.width / 2, canvas.height * 0.47);
      ctx.textAlign = "left";
      if (!isBossMusicPlaying) {
        playMusic('boss');
        isBossMusicPlaying = true; // Now it won't run again!
    }
} else {
    // This part resets the flag when the timer finishes
    if (isBossMusicPlaying) {
        isBossMusicPlaying = false;
        // Optionally switch back to chill here, or wait until the battle is over
    } 

  }
    
    // Overlay Stats Panel (Transparent Background Box)
    ctx.save();
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)"; // Black with 30% transparency
    // Draws a box on the left side covering the score, level, and combo area
    // Arguments: x, y, width, height, optional border radius
    ctx.beginPath();
    ctx.roundRect(10, 15, 230, 140, 8); 
    ctx.fill();
    ctx.restore();

    // Overlay Stats Rendering
    ctx.font = "bold 28px 'Segoe UI'"; ctx.fillStyle = "#FFE082"; ctx.fillText(`🐟 SCORE: ${score}`, 20, 48);
    ctx.font = "bold 16px monospace"; ctx.fillStyle = "#81C784"; ctx.fillText(`🔧 ROD LV ${fishingRodLevel}`, 20, 88);
    ctx.font = "bold 24px monospace";
    if (bossMode) {
      ctx.fillStyle = "#FF5252"; ctx.fillText(`💔 BOSS STRIKES: ${bossStrikes}/10`, 20, 125);
    } else {
      if (combo > 0) {
        ctx.fillStyle = "#FF9800"; ctx.fillText(`🔥 COMBO x${combo}`, 20, 125);
        ctx.fillStyle = "rgba(255,152,0,0.3)"; ctx.fillRect(20, 138, 150, 6);
        ctx.fillStyle = "#FF5722"; ctx.fillRect(20, 138, (comboTimer / 280) * 150, 6);
      } else { ctx.fillStyle = "#AAA"; ctx.fillText(`COMBO x0`, 20, 125); }
    }
    
    for (let p of popups) { ctx.font = "bold 22px monospace"; ctx.fillStyle = p.color || "#FFD700"; ctx.fillText(p.text, p.x - 40, p.y); }
  }
  
  // ========== MODULAR PAUSE MENU & INTERACTION CODES ==========
  function togglePauseMenu() {
    if (gameState === "paused") {
      gameState = "normal";
      pauseScreen.style.display = "none";
    } else {
      gameState = "paused";
      pauseScreen.style.display = "flex";
      // Auto-open the Bag Tab on pause entry
      openTab('bagTab');
      updateMenuUI();
    }
  }

  function openTab(tabId) {
    // Hide all tabs contents
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => content.style.display = 'none');
    
    // Display targeted tab
    document.getElementById(tabId).style.display = 'block';
    updateMenuUI();
  }

  function updateMenuUI() {
    // 1. Update Bag content items dynamically
    const bagTab = document.getElementById('bagTab');
    bagTab.innerHTML = '';
    const fishColors = { "Kecil": "#FF8A65", "Sedang": "#64B5F6", "Besar": "#BA68C8", "Neon": "#00FFCC", "Pedang": "#ECEFF1", "Legendaris": "#FFD700", "Megalodon": "#FF3D00" };
    
    for (let key in inventory) {
      const itemRow = document.createElement('div');
      itemRow.className = 'bag-item';
      itemRow.innerHTML = `<span style="color:${fishColors[key]}">● ${key}</span> <span>x${inventory[key]}</span>`;
      bagTab.appendChild(itemRow);
    }

    // 2. Update Upgrade menu layout values
    document.getElementById('menuRodLevel').textContent = `Level: ${fishingRodLevel} / ${maxRodLevel}`;
    document.getElementById('menuRodBonus').textContent = `+${((fishingRodLevel - 1) * 0.8).toFixed(1)}% success width bonus`;
    
    const upBtn = document.getElementById('menuUpgradeBtn');
    const costText = document.getElementById('menuRodCost');
    if (fishingRodLevel < maxRodLevel) {
      const cost = getUpgradeCost();
      costText.textContent = `Cost: ${cost} Points (Current: ${score})`;
      costText.style.color = score >= cost ? "#81C784" : "#ff5252";
      upBtn.disabled = score < cost;
    } else {
      costText.textContent = "✨ MAX LEVEL REACHED ✨";
      costText.style.color = "#FFD700";
      upBtn.disabled = true;
    }
  }

  function triggerUpgrade() {
    if(performUpgrade()) {
      updateMenuUI();
    }
  }

  function goToMainMenu() {
    alert("Going back to main menu... (Simulation)");
    togglePauseMenu();
    score = 0;
    fishingRodLevel = 1;
    for(let k in inventory) inventory[k] = 0;
  }

  // EVENT HANDLERS (KEYBOARD DUAL ASSIGNMENT & CLICKS)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      togglePauseMenu();
      e.preventDefault();
      return;
    }
    if (e.key === "9") { if (!bossMode && !bossDefeated) spawnMegalodon(); e.preventDefault(); return; }
    if (gameState === "paused") return;

    if (e.code === "Space") {
      e.preventDefault();
      handleActionTrigger();
    }
    keys[e.code] = true;
  });
  
  document.addEventListener("keyup", (e) => { keys[e.code] = false; });

  // Mouse Left/Right Click integration for Fishing mechanics
  window.addEventListener("mousedown", (e) => {
    // Ignore down-clicks pointing directly to HTML UI buttons
    if (e.target.closest('.menu-btn') || e.target.closest('.pause-window') || e.target.closest('.mobile-controls')) return;
    
    if (e.button === 0 || e.button === 2) { // Left Click or Right Click
      handleActionTrigger();
    }
  });

  // Block browser default context menu popups on right click
  window.addEventListener("contextmenu", e => e.preventDefault());

  // TOUCH/MOBILE SCREEN VIRTUAL HARD-ATTACHED ACTION ASSIGNMENTS
  document.getElementById('menuBtn').addEventListener('click', togglePauseMenu);
  
  const bLeft = document.getElementById('btnLeft');
  const bRight = document.getElementById('btnRight');
  const bCast = document.getElementById('btnCast');

  bLeft.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingLeft = true; });
  bLeft.addEventListener('touchend', () => isMovingLeft = false);
  bRight.addEventListener('touchstart', (e) => { e.preventDefault(); isMovingRight = true; });
  bRight.addEventListener('touchend', () => isMovingRight = false);
  bCast.addEventListener('touchstart', (e) => { e.preventDefault(); handleActionTrigger(); });

  function init() {
    loadGame();
    updateWorldBounds();
    boat.x = canvas.width / 2;
    updateFishermanPos();
    resetRodPosition();
    
    // 👇 SPAWN OCEAN FLOOR DECORATIONS 👇
    decorations = [];
    const totalDecorations = Math.floor(canvas.width / 45); // Adjust density based on screen size
    const coralColors = ["#FF6B6B", "#FF8E53", "#FF4081", "#4A148C", "#00E676", "#FFD700"];
    
    for (let i = 0; i < totalDecorations; i++) {
      decorations.push({
        // Spread them evenly across the floor with a little bit of randomness
        x: (i * (canvas.width / totalDecorations)) + (Math.random() * 20 - 10),
        type: Math.random() < 0.4 ? "seaweed" : "coral",
        size: 15 + Math.random() * 20, // Random heights
        color: coralColors[Math.floor(Math.random() * coralColors.length)],
        swayOffset: Math.random() * Math.PI * 2 // Unique rhythm for seaweed swaying
      });
    }
    // 👆 DECORATION GENERATION END 👆

    for (let i = 0; i < 6; i++) spawnFish();
    initStars();
  }
  
  let lastFrameTime = performance.now();
  function gameLoop(now) {
    let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
    lastFrameTime = now;
    
    updateDayNightCycle(delta);
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }
  
  init();
  gameLoop(performance.now());
</script>
</body>
</html>
