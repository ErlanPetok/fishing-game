<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fishing Game - Main Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a1a2e;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Quicksand', monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        .info-text {
            position: fixed;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: rgba(220, 240, 255, 0.7);
            background: rgba(0, 0, 0, 0.5);
            width: fit-content;
            margin: 0 auto;
            padding: 4px 16px;
            border-radius: 40px;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
        .debug-cycle {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: monospace;
            z-index: 20;
            pointer-events: none;
        }
        /* Hidden file input element */
        #skinInput {
            display: none;
        }
    </style>
</head>
<body>
<div class="info-text">🐟 Selamat datang di Fishing Game | Klik START untuk memulai petualangan memancing 🎣</div>
<div class="debug-cycle" id="cycleDebug">🌅 Sunset 0%</div>
<div style="position: absolute; bottom: 20px; left: 20px; color: #FFECB3; font-family: monospace; z-index: 50;">
    🔊 Volume: 
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
</div>

<input type="file" id="skinInput" accept="image/*">

<canvas id="menuCanvas"></canvas>

<script>
    const canvas = document.getElementById("menuCanvas");
    const ctx = canvas.getContext("2d");
    const cycleDebug = document.getElementById("cycleDebug");
    const skinInput = document.getElementById("skinInput");

    // 1. AUDIO SETUP
    const bgmChill = new Audio('github-gametest/bgm_chill.mp3');
    const bgmBoss = new Audio('github-gametest/bgm_boss.mp3');
    bgmChill.loop = true;
    bgmBoss.loop = true;

    let gameVolume = parseFloat(localStorage.getItem("gameVolume")) || 0.5;
    bgmChill.volume = gameVolume;
    bgmBoss.volume = gameVolume;

    function playMusic(track) {
        if (track === 'boss') {
            bgmChill.pause();
            bgmBoss.play().catch(e => console.log("Audio waiting..."));
        } else {
            bgmBoss.pause();
            bgmChill.play().catch(e => console.log("Audio waiting..."));
        }
    }

    function setVolume(val) {
        gameVolume = val;
        bgmChill.volume = gameVolume;
        bgmBoss.volume = gameVolume;
        localStorage.setItem("gameVolume", gameVolume);
    }

    // 2. INTERFACE SETUP
    window.addEventListener('DOMContentLoaded', () => {
        const volSlider = document.getElementById("volumeSlider");
        if (volSlider) {
            volSlider.value = gameVolume;
            volSlider.addEventListener("input", (e) => {
                setVolume(parseFloat(e.target.value));
            });
        }
    });


    let time = 0;
    let boatSway = 0, boatRock = 0;
    let boatX = 0, boatY = 0;
    let waterTop = 0, oceanFloor = 0;
    let decorativeFish = [];
    let bubbles = [];
    let decorations = [];
    
    // ========== CUSTOM SKIN FEATURE STATE ==========
    let customSkinImg = new Image(); // Create the object immediately
    let isSkinLoaded = false;
    let skinButtonText = "👕 GANTI MODEL";

    // --- ADD THIS BLOCK TO CHECK STORAGE ON LOAD ---
    const savedSkin = localStorage.getItem("customFishermanSkin");
    if (savedSkin) {
        customSkinImg.src = savedSkin;
        isSkinLoaded = true;
        skinButtonText = "✔ MODEL TERPASANG";
    }

    // Clear any previous skin from a past game session on launch if you want a clean slate,
    // or comment this line out if you want it to persist forever!
    //localStorage.removeItem("customFishermanSkin");

    // Load custom image via HTML5 FileReader & save to LocalStorage
    skinInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    customSkinImg = img;
                    isSkinLoaded = true;
                    skinButtonText = "✔ MODEL TERPASANG";
                    
                    // 👇 SAVE TO LOCALSTORAGE VAULT 👇
                    try {
                        localStorage.setItem("customFishermanSkin", event.target.result);
                    } catch (error) {
                        console.error("Gagal menyimpan model: Ukuran gambar terlalu besar!", error);
                        alert("Waduh, gambar ini terlalu besar untuk disimpan memori browser, Sensei! Coba gunakan gambar yang lebih kecil/kompresi ya~");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
    
    // ========== DAY/NIGHT CYCLE SYSTEM ==========
    let cycleTime = 0.0;           
    let cycleDuration = 60; // durasi siklus dalam detik     
    
    let starPositions = [];
    let starOpacity = 0;
    let moonX = canvas.width + 100;
    let moonY = 85;
    let moonOpacity = 0;
    let sunX = -100;
    let sunY = 0;
    let sunOpacity = 0;
    let waterDarkness = 0;
    let cloudPositions = [{x: 0, y: 42}, {x: 0, y: 58}];
    let cloudsActive = false;

    // Define alignment structures for menu list stack
    let startButton = { x: 0, y: 0, w: 220, h: 58 };
    let skinButton = { x: 0, y: 0, w: 220, h: 50 }; // Placed neatly under START
    let quitButton = { x: 0, y: 0, w: 220, h: 50 };
    let hoverStart = false, hoverSkin = false, hoverQuit = false;

    function initStars() {
        starPositions = [];
        for (let i = 0; i < 150; i++) {
            starPositions.push({
                x: Math.random() * canvas.width * 1.2,
                y: 20 + Math.random() * 150,
                size: 1 + Math.random() * 2,
                twinkle: Math.random() * Math.PI * 2
            });
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initStars();
        updateUIpos();
    }

    function updateUIpos() {
        const btnRightMargin = Math.min(140, canvas.width * 0.08);
        const btnStartX = canvas.width - startButton.w - btnRightMargin;
        const btnStartY = canvas.height * 0.38; // Adjusted up slightly to fit cleanly
        
        startButton.x = btnStartX;
        startButton.y = btnStartY;
        
        skinButton.x = btnStartX;
        skinButton.y = btnStartY + startButton.h + 20; // 20px gap below START
        
        quitButton.x = btnStartX;
        quitButton.y = skinButton.y + skinButton.h + 20; // 20px gap below SKIN
        
        boatX = Math.min(canvas.width * 0.22, 280);
        boatX = Math.max(boatX, 140);
        waterTop = Math.min(170, canvas.height * 0.22);
        oceanFloor = canvas.height - 68;
        if (oceanFloor < waterTop + 110) oceanFloor = waterTop + 120;
        boatY = waterTop - 36;
    }

    // ========== FISH VARIATIONS ENGINE ==========
    function spawnDecoFish() {
        if (decorativeFish.length > 15) return;
        const fromLeft = Math.random() < 0.5;
        let size, color, speed, name, type;
        const r = Math.random();
        
        if (r < 0.4) { name="Kecil"; type="normal"; size=12; color="#FF8A65"; speed=1.2+Math.random()*0.8; }
        else if (r < 0.68) { name="Sedang"; type="normal"; size=19; color="#64B5F6"; speed=0.8+Math.random()*0.6; }
        else if (r < 0.84) { name="Besar"; type="normal"; size=28; color="#BA68C8"; speed=0.6+Math.random()*0.4; }
        else if (r < 0.93) { name="Neon"; type="neon"; size=10; color="#00FFCC"; speed=2.0+Math.random()*0.8; }
        else { name="Legendaris"; type="gold"; size=32; color="#FFD700"; speed=0.4+Math.random()*0.3; }

        decorativeFish.push({
            name, type,
            x: fromLeft ? -50 : canvas.width + 50,
            y: waterTop + 25 + Math.random() * (oceanFloor - waterTop - 60),
            size: size, color: color, speed: speed, dir: fromLeft ? 1 : -1
        });
    }

    function updateDecoFish() {
        for (let i = 0; i < decorativeFish.length; i++) {
            const f = decorativeFish[i];
            f.x += f.speed * f.dir;
            if (f.x + f.size < -100 || f.x - f.size > canvas.width + 100) {
                decorativeFish.splice(i, 1); i--;
            }
        }
        if (Math.random() < 0.025) spawnDecoFish();
    }

    function addDecoBubble() {
        if (bubbles.length > 40) return;
        if (Math.random() > 0.08) return;
        bubbles.push({
            x: 20 + Math.random() * (canvas.width - 40),
            y: oceanFloor - 5 + Math.random() * 18,
            size: 2 + Math.random() * 5,
            speed: 0.4 + Math.random() * 1.2
        });
    }

    function updateBubbles() {
        for (let i = 0; i < bubbles.length; i++) {
            bubbles[i].y -= bubbles[i].speed;
            if (bubbles[i].y + bubbles[i].size < waterTop) {
                bubbles.splice(i, 1); i--;
            }
        }
        addDecoBubble();
    }

    // ========== CYCLE SYSTEM LOGIC ==========
    function updateDayNightCycle(deltaSec) {
        cycleTime += deltaSec / cycleDuration;
        if (cycleTime >= 1.0) cycleTime -= 1.0;
        
        let phaseName = "";
        if (cycleTime < 0.2) phaseName = "🌅 Sunset";
        else if (cycleTime < 0.4) phaseName = "🌙 Night";
        else if (cycleTime < 0.5) phaseName = "🌚 Midnight";
        else if (cycleTime < 0.7) phaseName = "🌤️ Sunrise";
        else phaseName = "☀️ Day";
        cycleDebug.textContent = `${phaseName} ${Math.floor(cycleTime * 100)}%`;
        
        let t = cycleTime;
        if (t >= 0.2 && t <= 0.7) {
            let starT = (t - 0.2) / 0.5;
            starOpacity = Math.sin(starT * Math.PI) * 0.85;
        } else { starOpacity = 0; }
        
        if (t >= 0.2 && t <= 0.7) {
            let moonT = (t - 0.2) / 0.5;
            if (t <= 0.5) {
                let startX = canvas.width - 80;
                let endX = canvas.width * 0.65;
                moonX = startX - (startX - endX) * (moonT * 2);
                moonOpacity = Math.sin(moonT * Math.PI) * 0.95;
            } else {
                let fadeT = (t - 0.5) / 0.2;
                moonX = canvas.width * 0.65 + fadeT * 180;
                moonOpacity = Math.max(0, 0.95 * (1 - fadeT * 1.5));
            }
            moonY = 75 + Math.sin(moonT * Math.PI) * 12;
        } else { moonOpacity = 0; }
        
        if (t >= 0.5 && t <= 0.7) {
            let sunT = (t - 0.5) / 0.2;
            sunX = -40 + sunT * (canvas.width * 0.35);
            sunOpacity = Math.sin(sunT * Math.PI) * 0.85;
            sunY = waterTop - 85;
        } else if (t >= 0.7 && t <= 0.9) {
            let dayT = (t - 0.7) / 0.2;
            sunX = canvas.width * 0.35 + dayT * (canvas.width * 0.45);
            sunOpacity = 0.85 * (1 - dayT * 0.5);
            sunY = waterTop - 85 + dayT * 20;
        } else if (t >= 0.9 && t <= 1.0) {
            let setT = (t - 0.9) / 0.1;
            sunX = canvas.width * 0.8 + setT * 150;
            sunOpacity = 0.4 * (1 - setT);
            sunY = waterTop - 65 + setT * 30;
        } else { sunOpacity = 0; }
        
        if (t >= 0.2 && t <= 0.7) {
            let darkT = (t - 0.2) / 0.5;
            waterDarkness = Math.sin(darkT * Math.PI) * 0.55;
        } else if (t >= 0.7 && t <= 0.8) {
            waterDarkness = Math.max(0, 0.55 * (1 - (t-0.7)/0.1));
        } else if (t >= 0 && t <= 0.1) {
            waterDarkness = 0.08 * (1 - t/0.1);
        } else { waterDarkness = 0; }
        
        if (t >= 0.7) {
            cloudsActive = true;
            let drift = (performance.now() * 0.0006) % (canvas.width + 400);
            cloudPositions[0] = { x: (canvas.width * 0.15 + drift) % (canvas.width + 300) - 150, y: 42 };
            cloudPositions[1] = { x: (canvas.width * 0.55 + drift * 0.7) % (canvas.width + 300) - 150, y: 58 };
        } else { cloudsActive = false; }
    }

    function drawBackground() {
        let t = cycleTime;
        let skyColor1, skyColor2, waterColor1, waterColor2, showOriginalClouds = true;
        
        if (t < 0.2) {
            skyColor1 = "#FFDAB9"; skyColor2 = "#7EC8E0"; waterColor1 = "#4A9FD8"; waterColor2 = "#0A2F44";
        } else if (t < 0.4) {
            let intensity = (t - 0.2) / 0.2, r = Math.floor(20 + intensity * 15), g = Math.floor(25 + intensity * 20), b = Math.floor(55 + intensity * 30);
            skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-10}, ${g-5}, ${b+10})`; waterColor1 = "#0F2B4F"; waterColor2 = "#051525"; showOriginalClouds = false;
        } else if (t < 0.5) {
            skyColor1 = "#0A0F2A"; skyColor2 = "#151B3A"; waterColor1 = "#081525"; waterColor2 = "#020810"; showOriginalClouds = false;
        } else if (t < 0.7) {
            let intensity = (t - 0.5) / 0.2, r = 255, g = Math.floor(150 + intensity * 68), b = Math.floor(100 + intensity * 85);
            skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-30}, ${g-20}, ${b+20})`; waterColor1 = "#2A6F9E"; waterColor2 = "#0A2F44"; showOriginalClouds = intensity < 0.7;
        } else {
            let intensity = (t - 0.7) / 0.3, r = Math.floor(135 - intensity * 35), g = Math.floor(206 - intensity * 26), b = Math.floor(235 - intensity * 15);
            skyColor1 = `rgb(${r}, ${g}, ${b})`; skyColor2 = `rgb(${r-20}, ${g-15}, ${b+10})`; waterColor1 = "#4A9FD8"; waterColor2 = "#0A2F44";
        }
        
        // Render Sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, waterTop);
        skyGrad.addColorStop(0, skyColor1); skyGrad.addColorStop(1, skyColor2);
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, waterTop);
        
        // Stars
        if (starOpacity > 0.05 && (t >= 0.2 && t <= 0.7)) {
            for (let star of starPositions) {
                ctx.fillStyle = `rgba(255, 245, 210, ${starOpacity * (0.4 + (0.5 + Math.sin(time * 3 + star.twinkle) * 0.5) * 0.6)})`;
                ctx.beginPath(); ctx.arc(star.x % canvas.width, star.y, star.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        
        // Moon
        if (moonOpacity > 0.05 && moonX > -50) {
            ctx.beginPath(); ctx.arc(moonX, moonY, 35, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 245, 210, ${moonOpacity * 0.9})`; ctx.fill();
        }
        
        // Sun
        if (sunOpacity > 0.05 && sunX > -80 && sunX < canvas.width + 100) {
            ctx.beginPath(); ctx.arc(sunX, sunY, 32, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 180, 70, ${sunOpacity * 0.9})`; ctx.fill();
            ctx.beginPath(); ctx.arc(sunX, sunY, 26, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 220, 100, ${sunOpacity})`; ctx.fill();
        }
        
        // Clouds
        if (showOriginalClouds) {
            ctx.fillStyle = `rgba(255, 248, 225, 0.85)`; ctx.beginPath();
            ctx.ellipse(80, 45, 60, 38, 0, 0, Math.PI * 2); ctx.ellipse(150, 28, 70, 45, 0, 0, Math.PI * 2); ctx.ellipse(230, 50, 55, 35, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(canvas.width - 150, 60, 80, 45, 0, 0, Math.PI * 2); ctx.ellipse(canvas.width - 60, 40, 65, 40, 0, 0, Math.PI * 2); ctx.fill();
        }

        if (cloudsActive && t >= 0.7) {
            ctx.fillStyle = "rgba(255, 252, 235, 0.7)";
            for (let cloud of cloudPositions) {
                ctx.beginPath(); ctx.ellipse(cloud.x, cloud.y, 52, 30, 0, 0, Math.PI * 2); ctx.ellipse(cloud.x + 38, cloud.y - 4, 45, 28, 0, 0, Math.PI * 2); ctx.fill();
            }
        }
        
        // Render Under-water
        const waterGrad = ctx.createLinearGradient(0, waterTop, 0, canvas.height);
        waterGrad.addColorStop(0, waterColor1); waterGrad.addColorStop(0.6, waterColor2); waterGrad.addColorStop(1, `rgba(0, 10, 20, 0.9)`);
        ctx.fillStyle = waterGrad; ctx.fillRect(0, waterTop, canvas.width, canvas.height - waterTop);
        
        if (waterDarkness > 0.02 && (t >= 0.2 && t <= 0.7)) {
            ctx.fillStyle = `rgba(5, 10, 30, ${waterDarkness * 0.5})`; ctx.fillRect(0, waterTop, canvas.width, canvas.height - waterTop);
        }

        // Waves
        ctx.beginPath(); ctx.moveTo(0, waterTop);
        for (let wx = 0; wx < canvas.width + 20; wx += 25) { ctx.lineTo(wx, waterTop + Math.sin(wx * 0.02 + time * 2.5) * 4); }
        ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fillStyle = "rgba(255, 255, 240, 0.15)"; ctx.fill();
        
        // Sand Floor Base
        ctx.fillStyle = "#8B6914"; ctx.fillRect(0, oceanFloor, canvas.width, canvas.height - oceanFloor);
        ctx.fillStyle = "#C49A3C";
        for (let i = 0; i < 45; i++) {
            ctx.beginPath(); ctx.arc((i * 57 + time * 12) % canvas.width, oceanFloor + 5, 2.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    // ========== FISH RENDER ENGINE ==========
    function drawBubblesAndFish() {
        for (let b of bubbles) {
            ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 230, 255, ${0.4 + Math.sin(time * 3 + b.x) * 0.15})`; ctx.fill();
        }
        
        for (let f of decorativeFish) {
            ctx.save();
            ctx.translate(f.x, f.y);
            if (f.dir < 0) ctx.scale(-1, 1);
            
            if (f.type === "neon") { ctx.shadowBlur = 12; ctx.shadowColor = "#00FFCC"; }
            ctx.fillStyle = f.color;
            ctx.beginPath(); ctx.ellipse(0, 0, f.size, f.size * 0.65, 0, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = f.type === "gold" ? "#FF9800" : "#4A2A1A"; 
            ctx.beginPath(); ctx.moveTo(-f.size * 0.7, -5); ctx.lineTo(-f.size * 0.95, 0); ctx.lineTo(-f.size * 0.7, 5); ctx.fill();
            
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(f.size * 0.4, -f.size * 0.12, f.size * 0.15, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#010101"; ctx.beginPath(); ctx.arc(f.size * 0.45, -f.size * 0.14, f.size * 0.08, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
    }

    function drawBoatAndFisherman() {
        const currentBoatX = boatX + Math.sin(time * 1.2) * 1.1;
        const currentBoatY = boatY + Math.sin(time * 1.8) * 1.3;
        ctx.save();
        ctx.translate(currentBoatX, currentBoatY);
        ctx.rotate(Math.sin(time * 1.8) * 0.045);
        
        // Draw Boat Structures
        ctx.fillStyle = "#8B5A2B"; ctx.fillRect(-48, 0, 96, 28);
        ctx.fillStyle = "#B97F44"; ctx.fillRect(-40, -10, 80, 12);
        ctx.fillStyle = "#CD9A5B"; ctx.fillRect(-28, -16, 56, 8);
        ctx.fillStyle = "#6B3E1A"; ctx.fillRect(35, -28, 5, 32); 

        // CHECK IF IMAGE MODEL IS UPLOADED
        if (isSkinLoaded && customSkinImg) {
            const customW = 100; // <--- ADJUST MAX WIDTH PIXELS HERE
            const customH = 100; // <--- ADJUST MAX HEIGHT PIXELS HERE
            ctx.drawImage(customSkinImg, -customW / 2, -customH, customW, customH);
            
            ctx.beginPath(); ctx.moveTo(0, -customH * 0.7); ctx.lineTo(42, -48); ctx.strokeStyle = "#A67B5B"; ctx.lineWidth = 2; ctx.stroke();
        } else {
            // Default vector look
            ctx.fillStyle = "#4A6A8F"; ctx.fillRect(-10, -42, 20, 38);
            ctx.fillStyle = "#FFDFB3"; ctx.beginPath(); ctx.arc(0, -48, 12, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#D2B48C"; ctx.fillRect(-15, -58, 30, 9);
            ctx.fillStyle = "#F4C28B"; ctx.fillRect(-9, -62, 18, 8);
            ctx.beginPath(); ctx.arc(3, -45, 4, 0.05, Math.PI - 0.05); ctx.strokeStyle = "#5D3A1A"; ctx.lineWidth = 1.8; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(15, -38); ctx.lineTo(42, -48); ctx.lineTo(44, -44); ctx.fillStyle = "#A67B5B"; ctx.fill();
        }
        
        ctx.restore();
        ctx.fillStyle = "rgba(255,255,210,0.25)";
        ctx.beginPath(); ctx.ellipse(currentBoatX, currentBoatY + 12, 52, 12, 0, 0, Math.PI * 2); ctx.fill();
    }

    function drawButtons() {
        // 1. START GAME BUTTON
        ctx.fillStyle = hoverStart ? "#FFD966" : "#F7B773";
        ctx.beginPath(); ctx.roundRect(startButton.x, startButton.y, startButton.w, startButton.h, 40); ctx.fill();
        ctx.fillStyle = hoverStart ? "#4F3B1C" : "#2C3E2B";
        ctx.font = `bold ${Math.min(26, canvas.width * 0.04)}px 'Segoe UI'`;
        ctx.textAlign = "center";
        ctx.fillText("START GAME", startButton.x + startButton.w/2, startButton.y + startButton.h/2 + 8);
        
        // 2. CHANGE SKIN BUTTON (Styled perfectly to match the list)
        ctx.fillStyle = hoverSkin ? "#FFE082" : "rgba(15, 32, 67, 0.85)";
        ctx.strokeStyle = hoverSkin ? "#F7B773" : "rgba(255, 236, 179, 0.4)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(skinButton.x, skinButton.y, skinButton.w, skinButton.h, 40); ctx.fill(); ctx.stroke();
        ctx.fillStyle = hoverSkin ? "#2C3E2B" : "#FFECB3";
        ctx.font = `bold ${Math.min(18, canvas.width * 0.035)}px 'Segoe UI'`;
        ctx.fillText(skinButtonText, skinButton.x + skinButton.w/2, skinButton.y + skinButton.h/2 + 6);

        // 3. QUIT BUTTON
        ctx.fillStyle = hoverQuit ? "#CFA5A5" : "#A5695D";
        ctx.beginPath(); ctx.roundRect(quitButton.x, quitButton.y, quitButton.w, quitButton.h, 40); ctx.fill();
        ctx.fillStyle = hoverQuit ? "#2D1E1A" : "#FEE3C0";
        ctx.font = `bold ${Math.min(22, canvas.width * 0.038)}px 'Segoe UI'`;
        ctx.fillText("🚪 QUIT", quitButton.x + quitButton.w/2, quitButton.y + quitButton.h/2 + 7);
        ctx.textAlign = "left";
    }

    function drawTitle() {
        const titleX = canvas.width / 2;
        const titleY = Math.min(130, canvas.height * 0.16);
        ctx.font = `bold ${Math.min(54, canvas.width * 0.07)}px 'Segoe UI', 'Poppins'`;
        ctx.shadowBlur = 8; ctx.shadowColor = "#0a1a2e";
        ctx.fillStyle = "#FFECB3"; ctx.textAlign = "center";
        ctx.fillText("FISHING ADVENTURE 🎣", titleX, titleY);
        ctx.font = `20px 'Quicksand'`; ctx.fillStyle = "#FFF0CC";
        ctx.fillText("Tantang Megalodon & Koleksi Ikan Legendaris", titleX, titleY + 45);
        ctx.textAlign = "left"; ctx.shadowBlur = 0;
    }

    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x+r, y);
            this.lineTo(x+w-r, y);
            this.quadraticCurveTo(x+w, y, x+w, y+r);
            this.lineTo(x+w, y+h-r);
            this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
            this.lineTo(x+r, y+h);
            this.quadraticCurveTo(x, y+h, x, y+h-r);
            this.lineTo(x, y+r);
            this.quadraticCurveTo(x, y, x+r, y);
            return this;
        };
    }

    function updateMenu(deltaSec) {
        time += 0.025;
        updateDayNightCycle(deltaSec);
        updateDecoFish();
        updateBubbles();
        updateUIpos();
    }

    function drawMenu() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        // RENDER OCEAN DECORATIONS
        for (let dec of decorations) {
            ctx.save();
            ctx.translate(dec.x, oceanFloor);
            
            if (dec.type === "seaweed") {
                let sway = Math.sin(time * 1.5 + dec.swayOffset) * (dec.size * 0.18);
                ctx.fillStyle = "#26A69A"; 
                ctx.beginPath();
                ctx.moveTo(-5, 2);
                ctx.bezierCurveTo(-8, -dec.size * 0.3, -2 + sway, -dec.size * 0.6, 0 + sway, -dec.size);
                ctx.bezierCurveTo(4 + sway, -dec.size * 0.6, 6, -dec.size * 0.3, 5, 2);
                ctx.closePath();
                ctx.fill();
            } else {
                ctx.fillStyle = dec.color;
                ctx.beginPath();
                ctx.fillRect(-4, -dec.size * 0.6, 8, dec.size * 0.6 + 2);
                ctx.fillRect(-dec.size * 0.35, -dec.size * 0.45, dec.size * 0.35, 6);
                ctx.fillRect(-dec.size * 0.35, -dec.size * 0.7, 5, dec.size * 0.25);
                ctx.fillRect(0, -dec.size * 0.3, dec.size * 0.4, 5);
                ctx.fillRect(dec.size * 0.4 - 5, -dec.size * 0.55, 5, dec.size * 0.25);
            }
            ctx.restore();
        }
        
        drawBubblesAndFish();
        drawBoatAndFisherman();
        drawTitle();
        drawButtons();
        ctx.font = "12px monospace"; ctx.fillStyle = "rgba(255,250,210,0.7)"; ctx.textAlign = "center";
        ctx.fillText("🌅 Waktu terus berjalan | Klik START untuk memancing", canvas.width/2, canvas.height - 18);
        ctx.textAlign = "left";
    }

    function handleMouseMove(e) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        hoverStart = (mouseX >= startButton.x && mouseX <= startButton.x + startButton.w &&
                      mouseY >= startButton.y && mouseY <= startButton.y + startButton.h);
                      
        hoverSkin = (mouseX >= skinButton.x && mouseX <= skinButton.x + skinButton.w &&
                     mouseY >= skinButton.y && mouseY <= skinButton.y + skinButton.h);
                     
        hoverQuit = (mouseX >= quitButton.x && mouseX <= quitButton.x + quitButton.w &&
                     mouseY >= quitButton.y && mouseY <= quitButton.y + quitButton.h);
    }

    function handleClick(e) { 
        // Unlock audio on ANY click
        if (bgmChill.paused) bgmChill.play().catch(e => {});

        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if (mouseX >= startButton.x && mouseX <= startButton.x + startButton.w &&
            mouseY >= startButton.y && mouseY <= startButton.y + startButton.h) {
            window.location.href = "github-gametest/epic_fishing_game.html"; 
        }
        
        if (mouseX >= skinButton.x && mouseX <= skinButton.x + skinButton.w &&
            mouseY >= skinButton.y && mouseY <= skinButton.y + skinButton.h) {
            skinInput.click();
        }
        
        if (mouseX >= quitButton.x && mouseX <= quitButton.x + quitButton.w &&
            mouseY >= quitButton.y && mouseY <= quitButton.y + quitButton.h) {
            if (confirm("Yakin Sensei ingin keluar?")) window.close();
        }
    }

    window.addEventListener("resize", () => { resizeCanvas(); });
    canvas.addEventListener("mousemove", handleMouseMove);
    canvas.addEventListener("click", handleClick);
    
    resizeCanvas();

    decorations = [];
    const totalDecorations = Math.floor(canvas.width / 45); 
    const coralColors = ["#FF6B6B", "#FF8E53", "#FF4081", "#4A148C", "#00E676", "#FFD700"];
    
    for (let i = 0; i < totalDecorations; i++) {
      decorations.push({
        x: (i * (canvas.width / totalDecorations)) + (Math.random() * 20 - 10),
        type: Math.random() < 0.4 ? "seaweed" : "coral",
        size: 15 + Math.random() * 20, 
        color: coralColors[Math.floor(Math.random() * coralColors.length)],
        swayOffset: Math.random() * Math.PI * 2 
      });
    }

    for (let i = 0; i < 8; i++) spawnDecoFish();
    for (let i = 0; i < 15; i++) addDecoBubble();
    
    let lastFrameTime = performance.now();
    function menuLoop(now) {
        let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
        lastFrameTime = now;
        
        updateMenu(delta);
        drawMenu();
        requestAnimationFrame(menuLoop);
    }
    menuLoop(performance.now());
</script>
</body>
